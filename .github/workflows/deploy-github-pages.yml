# Публикация на GitHub Pages (ветка gh-pages).
# Включите в репозитории: Settings → Pages → Source: Deploy from branch → gh-pages / root.

name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Compute base path for GitHub Pages
        run: |
          NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [ "$NAME" = "${OWNER}.github.io" ]; then
            echo "VITE_BASE_PATH=/" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE_PATH=/$NAME/" >> "$GITHUB_ENV"
          fi

      - run: npm ci
      - run: npm run build:gh-pages

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
